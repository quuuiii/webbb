<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Form Validation</title>
</head>

<body>

<h3>Please input a number between 150 and 300:</h3>

<input type="text" id="inputValue">
<button onclick="checkValue()">Submit</button>

<p id="message"></p>

<script>
function checkValue() {
  var value = document.getElementById("inputValue").value;

  if (value > 300) {
    document.getElementById("message").innerHTML = "Value too large";
  } 
  else if (value < 150) {
    document.getElementById("message").innerHTML = "Value too small";
  } 
  else {
    document.getElementById("message").innerHTML = "Input OK";
  }
}
</script>

</body>
</html>
