<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Headings Style</title>

<style>
body {
    background-color: #eee;
    padding: 30px;
    font-family: "Times New Roman", serif;
}

/* Heading 1 */
.h1 {
    font-size: 36px;
    font-weight: bold;
    border-top: 5px solid black;
    padding-top: 10px;
    text-shadow: 2px 2px 0px pink;
    margin-bottom: 40px;
}

/* Heading 2 */
.h2 {
    font-size: 28px;
    font-style: italic;
    border: 4px solid yellow;
    padding: 10px;
    margin-bottom: 40px;
}

/* Heading 3 */
.h3 {
    font-size: 24px;
    text-align: right;
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="h1">This is heading 1</div>

<div class="h2">This is heading 2</div>

<div class="h3">This is heading 3</div>

</body>
</html>
