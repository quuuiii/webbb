<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Image Styling Practice</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 40px 24px;
    }

    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 30px;
    }

    .photo {
      width: 33%;
      height: 300px;
      object-fit: cover;
      display: block;
      background: #ddd;
    }

    .photo-left {
      border-radius: 18px;
    }

    .photo-center-wrap {
      width: 150px;
      height: 150px;
      flex: 0 0 150px;
      margin-top: 10px;
      border: 3px solid #4b4367;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 0 2px #ffffff inset;
    }

    .photo-center {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 900px) {
      .gallery {
        flex-direction: column;
        align-items: center;
      }

      .photo {
        width: 90%;
        max-width: 420px;
      }

      .photo-center-wrap {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div class="gallery">
    <img
      class="photo photo-left"
      src="https://images.unsplash.com/photo-1431274172761-fca41d930114?auto=format&fit=crop&w=900&q=80"
      alt="Paris street"
    />

    <div class="photo-center-wrap">
      <img
        class="photo-center"
        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=500&q=80"
        alt="Nature"
      />
    </div>

    <img
      class="photo photo-right"
      src="https://images.unsplash.com/photo-1431274172761-fca41d930114?auto=format&fit=crop&w=900&q=80"
      alt="Paris street"
    />
  </div>
</body>
</html>
