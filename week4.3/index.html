<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shapes</title>

<style>
.container{
    position:relative;
    width:300px;
    height:200px;
}

.rectamgle{
    width:200px;
    height:150px;
    background-color:blue;
    position:absolute;
    top:20px;
    left:20px;
}

.circle{
    width:120px;
    height:120px;
    background-color:yellow;
    border-radius:50%;
    border:8px solid red;
    position:absolute;
    top:50px;
    left:120px;
}
</style>
</head>
<body>

<div class="container">
    <div class="rectangle"></div>
    <div class="circle"></div>
</div>

</body>
</html>
