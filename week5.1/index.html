<!DOCTYPE html>
<html>
<head>
    <title>Hello World Style</title>
    <style>
        body {
        background-color: #eee;
        padding: 30px;
        }

        /* 第一個：雙框效果 */
        .box1 {
        background-color: #9ec3d1;
        border: 8px double red;
        padding: 20px;
        margin-bottom: 30px;
        font-size: 40px;
        font-weight: bold;
        }

        /* 第二個：圓角 + 藍框 */
        .box2 {
        background-color: yellow;
        border: 5px solid #4aa3df;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 30px;
        font-size: 40px;
        font-weight: bold;
        }

        /* 第三個：點點背景 + 虛線框 */
        .box3 {
        background-color: #3fa66b;
        border: 8px dotted gray;
        padding: 20px;
        font-size: 40px;
        font-weight: bold;
        color: black;
        }
    </style>
</head>

<body>

    <div class="box1">Hello World</div>

    <div class="box2">Hello World</div>

    <div class="box3">Hello World</div>

</body>
</html>
