<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Layout</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #4da3d9;
}

/* 外框 */
.container {
    width: 90%;
    max-width: 800px;
    margin: 30px auto;
    background: #eee;
    padding: 10px;
    border-radius: 10px;
}

/* 綠色區塊 */
.header {
    background: #a4c639;
    height: 120px;
    margin-bottom: 10px;
}

/* 藍色區塊 */
.middle {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.middle div {
    background: #1fb5c1;
    height: 100px;
    flex: 1;
}

/* 灰色區塊 */
.footer {
    display: flex;
    gap: 10px;
}

.footer div {
    background: #ccc;
    height: 60px;
    flex: 1;
}

/* 📱 手機版（小於480px） */
@media (max-width: 480px) {

    .middle {
        flex-direction: column;
    }

    .footer {
        flex-wrap: wrap;
    }

    .footer div {
        width: 48%;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="header"></div>

    <div class="middle">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="footer">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

</div>

</body>
</html>
