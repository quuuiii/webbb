<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Web Page</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #4ea3df;
      padding: 30px;
    }

    .wrapper {
      max-width: 900px;
      margin: 0 auto;
      background: #f5f5f5;
      border-radius: 16px;
      padding: 18px;
    }

    .green {
      width: 100%;
      height: 140px;
      background: #a8c93c;
      margin-bottom: 12px;
    }

    .blue-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .blue {
      flex: 1;
      height: 180px;
      background: #19bfd0;
    }

    .gray-row {
      display: flex;
      gap: 12px;
    }

    .gray {
      flex: 1;
      height: 90px;
      background: #d9dee2;
    }

    @media screen and (max-width: 480px) {
      .blue-row {
        flex-direction: column;
      }

      .blue {
        height: 90px;
      }

      .gray-row {
        flex-wrap: wrap;
      }

      .gray {
        flex: 0 0 calc(50% - 6px);
        height: 55px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="green"></div>

    <div class="blue-row">
      <div class="blue"></div>
      <div class="blue"></div>
      <div class="blue"></div>
    </div>

    <div class="gray-row">
      <div class="gray"></div>
      <div class="gray"></div>
      <div class="gray"></div>
      <div class="gray"></div>
    </div>
  </div>
</body>
</html>
