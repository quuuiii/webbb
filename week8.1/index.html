<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查看資訊範例</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Roboto, Arial, sans-serif;
      background: #f3f3f3;
      padding: 40px;
    }

    .wrap {
      width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #dddddd;
    }

    .header {
      height: 35px;
      background: #f6f6f6;
      border-bottom: 1px solid #e6e6e6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .title {
      font-size: 13px;
      color: #2f2f2f;
    }

    .info-btn {
      height: 22px;
      padding: 0 18px;
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      background: #ffffff;
      color: #2f2f2f;
      font-size: 13px;
      font-family: Roboto, Arial, sans-serif;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      padding: 20px;
    }

    .image-box {
      width: 496px;
      max-width: 100%;
      margin-bottom: 16px;
      background: #f6dfbf;
    }

    .image-box img {
      width: 100%;
      display: block;
    }

    .info-box {
      display: none;
      border-top: 1px solid #dddddd;
      padding-top: 10px;
    }

    .info-box.show {
      display: block;
    }

    .info-row {
      min-height: 28px;
      background: #8ff38f;
      margin-bottom: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #707070;
      line-height: 1.4;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">預覽</div>
      <button class="info-btn" id="toggleBtn">查看資訊</button>
    </div>

    <div class="content">
      <div class="image-box">
        <img src="https://picsum.photos/450/240" alt="預覽圖片">
      </div>

      <div class="info-box" id="infoBox">
        <div class="info-row">修改日期：2017/10/12</div>
        <div class="info-row">類型：JPG</div>
        <div class="info-row">大小：456.97KB</div>
        <div class="info-row">路徑：C:\Users\Public\Pictures\sample.jpg</div>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById("toggleBtn");
    const infoBox = document.getElementById("infoBox");

    toggleBtn.addEventListener("click", function () {
      infoBox.classList.toggle("show");

      if (infoBox.classList.contains("show")) {
        toggleBtn.textContent = "收起資訊";
      } else {
        toggleBtn.textContent = "查看資訊";
      }
    });
  </script>
</body>
</html>
