<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Preview UI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Roboto, Arial, sans-serif;
      background: #f3f3f3;
      color: #2f2f2f;
    }

    .app {
      width: 1100px;
      margin: 30px auto;
      background: #ffffff;
      border: 1px solid #dcdcdc;
    }

    .main {
      display: flex;
      min-height: 520px;
    }

    /* 左側列表 */
    .sidebar {
      width: 470px;
      border-right: 1px solid #d9d9d9;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      height: 35px;
      background: #f6f6f6;
      border-bottom: 1px solid #eaeaea;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 13px;
      color: #2f2f2f;
    }

    .file-list {
      list-style: none;
      margin: 0;
      padding: 0;
      flex: 1;
      overflow-y: auto;
    }

    .file-item {
      height: 56px;
      border-top: 1px solid #eaeaea;
      border-bottom: 1px solid #eaeaea;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 12px;
      background: #ffffff;
      cursor: pointer;
    }

    .file-item.selected {
      background: #e8f3ff;
      border-top: 1px solid #cfddff;
      border-bottom: 1px solid #cfddff;
    }

    .file-check {
      width: 18px;
      height: 18px;
      accent-color: #8a3ffc;
      flex-shrink: 0;
    }

    .file-name {
      font-size: 13px;
      color: #2f2f2f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-footer {
      height: 30px;
      background: #f3f3f3;
      border-top: 1px solid #e0e0e0;
      padding: 0 12px;
      display: flex;
      align-items: center;
      font-size: 13px;
      color: #2f2f2f;
    }

    .sidebar-footer .count-blue {
      color: #0084ff;
      margin-left: 4px;
    }

    /* 右側預覽 */
    .preview-panel {
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      height: 35px;
      background: #f6f6f6;
      border-bottom: 1px solid #e6e6e6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 0 20px;
    }

    .preview-title {
      font-size: 13px;
      color: #2f2f2f;
    }

    .info-btn {
      height: 22px;
      padding: 0 18px;
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      background: #ffffff;
      color: #2f2f2f;
      font-size: 13px;
      font-family: Roboto, Arial, sans-serif;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .info-btn:hover {
      background: #fafafa;
    }

    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 26px 26px 20px 20px;
      background: #ffffff;
    }

    .preview-image-wrap {
      width: 496px;
      max-width: 100%;
      background: #f6dfbf;
      padding: 0;
      margin-bottom: 20px;
    }

    .preview-image {
      width: 100%;
      display: block;
    }

    .info-box {
      display: none;
      border-top: 1px solid #dddddd;
      padding-top: 10px;
      min-height: 120px;
    }

    .info-box.show {
      display: block;
    }

    .info-row {
      min-height: 28px;
      background: #8ff38f;
      margin-bottom: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #707070;
      display: flex;
      align-items: center;
      line-height: 1.4;
      word-break: break-all;
    }

    .info-label {
      margin-right: 6px;
      color: #707070;
      flex-shrink: 0;
    }

    .info-value {
      color: #707070;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="main">
      <!-- 左側 -->
      <div class="sidebar">
        <div class="sidebar-header">類別</div>

        <ul class="file-list" id="fileList">
          <li class="file-item selected"
              data-name="20171012_1.jpg"
              data-date="2017/10/12"
              data-type="JPG"
              data-size="456.97KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_1.jpg</span>
          </li>

          <li class="file-item"
              data-name="20171012_2.jpg"
              data-date="2017/10/12"
              data-type="JPG"
              data-size="398.25KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_2.jpg</span>
          </li>

          <li class="file-item"
              data-name="20171012_3.png"
              data-date="2017/10/12"
              data-type="PNG"
              data-size="512.40KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_3.png</span>
          </li>

          <li class="file-item"
              data-name="20171012_4.jpg"
              data-date="2017/10/12"
              data-type="JPG"
              data-size="456.97KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_4.jpg</span>
          </li>

          <li class="file-item"
              data-name="20171012_5.jpg"
              data-date="2017/10/12"
              data-type="JPG"
              data-size="421.81KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_5.jpg</span>
          </li>

          <li class="file-item"
              data-name="20171012_6.png"
              data-date="2017/10/12"
              data-type="PNG"
              data-size="601.10KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_6.png</span>
          </li>

          <li class="file-item"
              data-name="20171012_7.png"
              data-date="2017/10/12"
              data-type="PNG"
              data-size="588.33KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_7.png</span>
          </li>

          <li class="file-item"
              data-name="20171012_8.png"
              data-date="2017/10/12"
              data-type="PNG"
              data-size="490.66KB"
              data-path="\\\\designcenter.qnap.com.tw\\DesignCenter\\PM-RD\\WEB\\Samples\\A_Image2PDF\\v2\\sample">
            <input class="file-check" type="checkbox">
            <span class="file-name">20171012_8.png</span>
          </li>
        </ul>

        <div class="sidebar-footer">
          數量:
          <span class="count-blue">64</span>
          / 100
        </div>
      </div>

      <!-- 右側 -->
      <div class="preview-panel">
        <div class="preview-header">
          <div class="preview-title">預覽</div>
          <button class="info-btn" id="toggleInfoBtn">查看資訊</button>
        </div>

        <div class="preview-scroll">
          <div class="preview-image-wrap">
            <img
              class="preview-image"
              src="https://picsum.photos/450/240?random=10"
              alt="preview"
              id="previewImage"
            >
          </div>

          <div class="info-box" id="infoBox">
            <div class="info-row">
              <span class="info-label">修改日期:</span>
              <span class="info-value" id="infoDate">2017/10/12</span>
            </div>

            <div class="info-row">
              <span class="info-label">類型:</span>
              <span class="info-value" id="infoType">JPG</span>
            </div>

            <div class="info-row">
              <span class="info-label">大小:</span>
              <span class="info-value" id="infoSize">456.97KB</span>
            </div>

            <div class="info-row" style="min-height: 48px; align-items: flex-start;">
              <span class="info-label">路徑:</span>
              <span class="info-value" id="infoPath">\\designcenter.qnap.com.tw\DesignCenter\PM-RD\WEB\Samples\A_Image2PDF\v2\sample</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const fileItems = document.querySelectorAll('.file-item');
    const toggleInfoBtn = document.getElementById('toggleInfoBtn');
    const infoBox = document.getElementById('infoBox');

    const infoDate = document.getElementById('infoDate');
    const infoType = document.getElementById('infoType');
    const infoSize = document.getElementById('infoSize');
    const infoPath = document.getElementById('infoPath');

    function updateInfo(item) {
      infoDate.textContent = item.dataset.date;
      infoType.textContent = item.dataset.type;
      infoSize.textContent = item.dataset.size;
      infoPath.textContent = item.dataset.path;
    }

    fileItems.forEach((item) => {
      item.addEventListener('click', (e) => {
        if (e.target.type !== 'checkbox') {
          fileItems.forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          updateInfo(item);
        }
      });
    });

    toggleInfoBtn.addEventListener('click', () => {
      infoBox.classList.toggle('show');
      toggleInfoBtn.textContent = infoBox.classList.contains('show') ? '收起資訊' : '查看資訊';
    });

    // 初始資料
    const defaultItem = document.querySelector('.file-item.selected');
    updateInfo(defaultItem);
  </script>
</body>
</html>
